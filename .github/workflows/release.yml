name: release

# Triggered by pushing a tag like "v0.2.0". Builds release binaries for
# kiln, kiln-compose, and kilnd on a real Linux runner (kilnd needs
# namespaces/cgroups at *build* time not at all - only at run time - so an
# ordinary ubuntu-latest runner is enough here) and attaches them to a
# GitHub Release. This is what kiln-dashboard's "check for updates" feature
# compares its own kilnd's `/version` against and downloads from.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run workspace test suite
        run: cargo test --workspace

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build output
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release -p kiln-cli -p kiln-compose -p kilnd

      - name: Package binaries
        # `bin/` prefix (not flat) so this same tarball also carries
        # `base-image/` without name collisions - the dashboard's
        # first-run setup extracts both from one archive into
        # $KILN_STORE directly (see kiln-dashboard/electron/main.js's
        # `installKilnBinariesScript`), landing at $KILN_STORE/bin/kiln
        # etc. and $KILN_STORE/base-image/.
        run: |
          mkdir -p dist/bin dist/base-image
          cp target/release/kiln target/release/kiln-compose target/release/kilnd dist/bin/
          cp -r base-image/Kilnfile base-image/bin dist/base-image/
          tar -C dist -czf kiln-linux-x86_64.tar.gz bin base-image

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: kiln-linux-x86_64.tar.gz
          generate_release_notes: true
