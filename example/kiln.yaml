# This example consumes `localhost:5555/echo:latest` as an external
# dependency pulled from a registry, rather than building it locally -
# see registry-demo/ for how that image was built and pushed there.
#
# Before `kiln-compose up`, both of these need to already be running:
#   1. The registry:  cargo run --example mini-registry -p kiln-image -- /tmp/mini-registry-data 5555
#   2. The image locally available: kiln pull localhost:5555/echo:latest
# (kiln-compose does not auto-pull missing images yet.)
services:
  echo:
    image: localhost:5555/echo:latest

  client:
    image: busybox:latest
    command: ["/bin/sh", "-c", "sleep 1; i=0; while [ $i -lt 3600 ]; do i=$((i+1)); echo \"client: $(wget -qO- http://echo:8080/)\"; sleep 5; done"]
    depends_on:
      - echo
