services:
  mysql:
    image: mysql:8.0
    # Kiln does not (yet) read an image's OCI `Entrypoint`, only `Cmd` -
    # the official mysql image relies on ENTRYPOINT
    # docker-entrypoint.sh to do first-boot datadir initialization before
    # ever launching mysqld itself, so it must be named explicitly here.
    command: ["docker-entrypoint.sh", "mysqld"]
    environment:
      MYSQL_ROOT_PASSWORD: demo
      MYSQL_DATABASE: kiln_demo
      MYSQL_USER: demo
      MYSQL_PASSWORD: demo
    # Reasonable headroom for a demo dataset, not a hard sizing
    # recommendation - see `kiln inspect --resources mysql-demo_mysql` for
    # live usage against these limits.
    resources:
      cpu: "1.0"
      memory: "512m"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -pdemo --silent"]
      interval: 5s
      timeout: 3s
      retries: 10
  api:
    build: ./api
    # `api` actually queries mysql on startup - service_healthy (not the
    # default service_started) makes `kiln-compose up` wait for mysql's
    # own healthcheck above to pass first, instead of racing api's first
    # connection attempt against mysql's own first-boot datadir
    # initialization.
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8081:8081"
  # Swapped in for Adminer - same role (a browser-facing web UI for the
  # same mysql service), different tool. Unlike Adminer, this image DOES
  # rely on its own ENTRYPOINT docker-entrypoint.sh (generates
  # /etc/phpmyadmin/config.secret.inc.php - the cookie-encryption secret
  # phpMyAdmin refuses to boot without) before ever handing off to
  # apache2-foreground - same reason mysql above needs its own command
  # override. PMA_HOST pre-fills the server field so the login form
  # doesn't need "mysql" typed in by hand.
  phpmyadmin:
    image: phpmyadmin:latest
    command: ["/docker-entrypoint.sh", "apache2-foreground"]
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
    ports:
      - "8082:80"
