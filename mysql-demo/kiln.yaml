services:
  mysql:
    image: mysql:8.0
    # Kiln does not (yet) read an image's OCI `Entrypoint`, only `Cmd` -
    # the official mysql image relies on ENTRYPOINT
    # docker-entrypoint.sh to do first-boot datadir initialization before
    # ever launching mysqld itself, so it must be named explicitly here.
    command: ["docker-entrypoint.sh", "mysqld"]
    environment:
      MYSQL_ROOT_PASSWORD: demo
      MYSQL_DATABASE: kiln_demo
      MYSQL_USER: demo
      MYSQL_PASSWORD: demo
  api:
    build: ./api
    depends_on:
      - mysql
    ports:
      - "8081:8081"
  # A real web UI for MySQL - browsers don't speak MySQL's wire protocol,
  # so this is how "open MySQL in a browser" actually works: Adminer is
  # a PHP app that speaks MySQL on its backend and serves an HTTP login
  # form/browser on its frontend. Its image's own Cmd already starts
  # PHP's built-in server on 8080 - no entrypoint override needed here,
  # unlike the mysql service above.
  adminer:
    image: adminer:latest
    depends_on:
      - mysql
    ports:
      - "8082:8080"
