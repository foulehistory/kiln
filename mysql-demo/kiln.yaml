services:
  mysql:
    image: mysql:8.0
    # Kiln does not (yet) read an image's OCI `Entrypoint`, only `Cmd` -
    # the official mysql image relies on ENTRYPOINT
    # docker-entrypoint.sh to do first-boot datadir initialization before
    # ever launching mysqld itself, so it must be named explicitly here.
    command: ["docker-entrypoint.sh", "mysqld"]
    environment:
      MYSQL_ROOT_PASSWORD: demo
      MYSQL_DATABASE: kiln_demo
      MYSQL_USER: demo
      MYSQL_PASSWORD: demo
  api:
    build: ./api
    depends_on:
      - mysql
    ports:
      - "8081:8081"
  # Swapped in for Adminer - same role (a browser-facing web UI for the
  # same mysql service), different tool. Its image's Cmd is already
  # "apache2-foreground" (no entrypoint override needed, like Adminer).
  # PMA_HOST pre-fills the server field so the login form doesn't need
  # "mysql" typed in by hand.
  phpmyadmin:
    image: phpmyadmin:latest
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
    ports:
      - "8082:80"
